<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 90">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="90" height="90" rx="18" fill="url(#logoGradient)"/>
  <g transform="translate(45, 45)" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Flask body -->
    <path d="M -8,-22 L -8,-8 L -18,18 L 18,18 L 8,-8 L 8,-22" />
    <!-- Flask top -->
    <line x1="-12" y1="-22" x2="12" y2="-22" />
    <!-- Liquid level -->
    <path d="M -12,8 L 12,8" stroke-dasharray="3,3" />
    <!-- Droplet -->
    <circle cx="0" cy="0" r="3" fill="white" stroke="none" />
  </g>
</svg>
