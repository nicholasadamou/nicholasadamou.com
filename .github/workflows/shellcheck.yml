name: Shell Script Validation

on:
  push:
    branches: [master, main]
    paths:
      - "**/*.sh"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    branches: [master, main]
    paths:
      - "**/*.sh"
      - ".github/workflows/shellcheck.yml"

env:
  SHELLCHECK_OPTS: -e SC1091 -S style

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          format: gcc
          severity: error
          additional_files: ""
          ignore_paths: "node_modules"
          disable_matcher: false
        env:
          SHELLCHECK_OPTS: -e SC1091 -S style

  shellcheck-detailed:
    name: Detailed ShellCheck Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Find shell scripts
        id: find-scripts
        run: |
          echo "Found shell scripts:"
          find . -name "*.sh" -type f -not -path "*/node_modules/*" 2>/dev/null | tee scripts_list.txt || true

      - name: Run ShellCheck on all scripts
        run: |
          echo "🔍 Running ShellCheck on shell scripts..."

          total_files=0
          passed_files=0
          failed_files=0

          mkdir -p shellcheck-results

          while IFS= read -r script; do
            if [[ -f "$script" ]]; then
              echo "📄 Checking: $script"
              total_files=$((total_files + 1))

              if shellcheck -f gcc -e SC1091 -S style "$script" > "shellcheck-results/$(basename "$script").txt" 2>&1; then
                echo "✅ $script - PASSED"
                passed_files=$((passed_files + 1))
              else
                echo "❌ $script - FAILED"
                failed_files=$((failed_files + 1))
                echo "Error details:"
                cat "shellcheck-results/$(basename "$script").txt"
                echo ""
              fi
            fi
          done < scripts_list.txt

          echo ""
          echo "📊 ShellCheck Summary:"
          echo "  Total files: $total_files"
          echo "  Passed: $passed_files"
          echo "  Failed: $failed_files"

          if [ $failed_files -gt 0 ]; then
            echo "❌ ShellCheck found issues in $failed_files script(s)"
            exit 1
          else
            echo "✅ All shell scripts passed ShellCheck validation!"
          fi

      - name: Upload ShellCheck results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shellcheck-results
          path: shellcheck-results/
          retention-days: 7

  validate-executable:
    name: Validate Script Executability
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check script permissions
        run: |
          echo "🔍 Checking script executability..."

          scripts=$(find . -name "*.sh" -type f -not -path "*/node_modules/*" 2>/dev/null || true)

          non_executable=()

          for script in $scripts; do
            if [[ -x "$script" ]]; then
              echo "✅ $script - executable"
            else
              echo "❌ $script - NOT executable"
              non_executable+=("$script")
            fi
          done

          if [ ${#non_executable[@]} -eq 0 ]; then
            echo "✅ All shell scripts are executable!"
          else
            echo "❌ Found ${#non_executable[@]} non-executable script(s):"
            printf '  - %s\n' "${non_executable[@]}"
            echo ""
            echo "To fix, run: chmod +x <script-name>"
            exit 1
          fi

  syntax-check:
    name: Shell Syntax Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate shell syntax
        run: |
          echo "🔍 Validating shell script syntax..."

          scripts=$(find . -name "*.sh" -type f -not -path "*/node_modules/*" 2>/dev/null || true)

          syntax_errors=()

          for script in $scripts; do
            echo "📄 Checking syntax: $script"

            if bash -n "$script"; then
              echo "✅ $script - syntax OK"
            else
              echo "❌ $script - syntax ERROR"
              syntax_errors+=("$script")
            fi
          done

          if [ ${#syntax_errors[@]} -eq 0 ]; then
            echo "✅ All shell scripts have valid syntax!"
          else
            echo "❌ Found syntax errors in ${#syntax_errors[@]} script(s):"
            printf '  - %s\n' "${syntax_errors[@]}"
            exit 1
          fi

  summary:
    name: Shell Script Quality Summary
    runs-on: ubuntu-latest
    needs:
      [shellcheck, shellcheck-detailed, validate-executable, syntax-check]
    if: always()

    steps:
      - name: Summary report
        run: |
          echo "📊 Shell Script Quality Report Summary"
          echo "======================================"

          echo "ShellCheck Standard: ${{ needs.shellcheck.result }}"
          echo "ShellCheck Detailed: ${{ needs.shellcheck-detailed.result }}"
          echo "Executable Check: ${{ needs.validate-executable.result }}"
          echo "Syntax Validation: ${{ needs.syntax-check.result }}"

          if [[ "${{ needs.shellcheck.result }}" == "success" &&
                "${{ needs.shellcheck-detailed.result }}" == "success" &&
                "${{ needs.validate-executable.result }}" == "success" &&
                "${{ needs.syntax-check.result }}" == "success" ]]; then
            echo "✅ Overall Status: ALL CHECKS PASSED"
            echo "🎉 All shell scripts meet quality standards!"
          else
            echo "❌ Overall Status: SOME CHECKS FAILED"
            echo "🔧 Please review and fix the issues above"
            exit 1
          fi
